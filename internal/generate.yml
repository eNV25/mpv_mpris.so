GENERATOR:
  PackageName: internal
  Includes:
    - client.h
PARSER:
  IncludePaths:
    - /usr/include
    # HACK: needed for stddef.h
    - /usr/lib/musl/include
    - /usr/lib/zig/libc/musl/include
    - /usr/lib/tinygo/lib/musl/include
  SourcesPaths:
    - mpv/client.h
TRANSLATOR:
  Rules:
    global:
      - { action: ignore, from: "^mpv_set_wakeup_callback$" }
      - { action: accept, from: "^mpv_" }
      - { action: accept, from: "^MPV_" }
      - { action: replace, from: "^MPV_", to: "_MPV_" }
  PtrTips:
    function:
      - { target: "^mpv_command_node$", tips: [ref,arr,ref] }
      - { target: "^mpv_command_ret$", tips: [ref,arr,ref] }
      - { target: "^mpv_event_to_node$", tips: [ref,ref] }
      - { target: "^mpv_", tips: [ref] }
  MemTips:
    - { target: "^mpv_", self: raw }
